name: Sync to Workspace

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize]
    branches: [main]
  release:
    types: [published]

env:
  STAGING_WORKSPACE_URL: https://realms-staging.stack.cards/skills/
  PRODUCTION_WORKSPACE_URL: https://app.boxel.ai/skills/

jobs:
  sync-workspace:
    name: Sync to Boxel Workspace
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Install Boxel CLI
        run: npm install -g @cardstack/boxel-cli@latest

      - name: Dry-run sync for PR
        if: github.event_name == 'pull_request' && github.event.action != 'closed'
        id: dry_run
        env:
          MATRIX_URL: https://matrix-staging.stack.cards
          MATRIX_USERNAME: ${{ secrets.STAGING_MATRIX_USERNAME }}
          MATRIX_PASSWORD: ${{ secrets.STAGING_MATRIX_PASSWORD }}
        run: |
          boxel profile add \
            --user "@${MATRIX_USERNAME}:stack.cards" \
            --password "${MATRIX_PASSWORD}" \
            --matrix-url "${MATRIX_URL}"

          echo "🔍 Running dry-run sync for PR #${{ github.event.number }}"
          echo "📁 Target workspace: ${{ env.STAGING_WORKSPACE_URL }}"
          echo "🔗 PR: ${{ github.event.pull_request.html_url }}"
          echo ""

          set +e
          OUTPUT=$(boxel realm push . ${{ env.STAGING_WORKSPACE_URL }} --delete --dry-run 2>&1)
          STATUS=$?
          set -e
          echo "$OUTPUT"

          {
            echo "SYNC_OUTPUT<<EOF"
            echo "$OUTPUT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo ""
          if [ $STATUS -ne 0 ]; then
            echo "❌ boxel realm push failed with exit code $STATUS"
            exit $STATUS
          fi
          echo "✅ Dry-run completed - no changes were made to the workspace"

      - name: Sync to staging workspace (main branch or merged PR)
        if: github.event_name == 'push'
        id: sync_staging
        env:
          MATRIX_URL: https://matrix-staging.stack.cards
          MATRIX_USERNAME: ${{ secrets.STAGING_MATRIX_USERNAME }}
          MATRIX_PASSWORD: ${{ secrets.STAGING_MATRIX_PASSWORD }}
        run: |
          boxel profile add \
            --user "@${MATRIX_USERNAME}:stack.cards" \
            --password "${MATRIX_PASSWORD}" \
            --matrix-url "${MATRIX_URL}"

          echo "🚀 Starting sync to staging workspace..."
          echo "📁 Target workspace: ${{ env.STAGING_WORKSPACE_URL }}"
          echo "🔗 Commit: ${{ github.sha }}"
          echo ""

          set +e
          OUTPUT=$(boxel realm push . ${{ env.STAGING_WORKSPACE_URL }} --delete 2>&1)
          STATUS=$?
          set -e
          echo "$OUTPUT"

          {
            echo "SYNC_OUTPUT<<EOF"
            echo "$OUTPUT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo ""
          if [ $STATUS -ne 0 ]; then
            echo "❌ boxel realm push failed with exit code $STATUS"
            exit $STATUS
          fi
          echo "✅ Staging workspace sync completed successfully!"

      - name: Sync to production workspace (release tags)
        if: github.event_name == 'release'
        id: sync_production
        env:
          MATRIX_URL: https://matrix.boxel.ai
          MATRIX_USERNAME: ${{ secrets.MATRIX_USERNAME }}
          MATRIX_PASSWORD: ${{ secrets.MATRIX_PASSWORD }}
        run: |
          boxel profile add \
            --user "@${MATRIX_USERNAME}:boxel.ai" \
            --password "${MATRIX_PASSWORD}" \
            --matrix-url "${MATRIX_URL}"

          echo "🚀 Starting sync to production workspace..."
          echo "📁 Target workspace: ${{ env.PRODUCTION_WORKSPACE_URL }}"
          echo "🏷️ Tag: ${{ github.ref_name }}"
          echo "🔗 Commit: ${{ github.sha }}"
          echo ""

          set +e
          OUTPUT=$(boxel realm push . ${{ env.PRODUCTION_WORKSPACE_URL }} --delete 2>&1)
          STATUS=$?
          set -e
          echo "$OUTPUT"

          {
            echo "SYNC_OUTPUT<<EOF"
            echo "$OUTPUT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo ""
          if [ $STATUS -ne 0 ]; then
            echo "❌ boxel realm push failed with exit code $STATUS"
            exit $STATUS
          fi
          echo "✅ Production workspace sync completed successfully!"

      - name: Compute sync report fields
        if: ${{ !cancelled() }}
        id: report
        run: |
          {
            echo "now=$(date -u '+%Y-%m-%d %H:%M:%S')"
            echo "short_sha=${GITHUB_SHA::7}"
          } >> "$GITHUB_OUTPUT"

      - name: Find merged PR for push event
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: merged_pr
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
            });
            const merged = prs.find(p => p.merged_at);
            return merged ? String(merged.number) : '';
          result-encoding: string

      - name: Report staging sync status on PR
        if: success() && steps.merged_pr.outputs.result != ''
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: workspace-sync
          number: ${{ steps.merged_pr.outputs.result }}
          message: |
            ## 🎉 Staging Workspace Sync Successful

            ✅ Successfully synced changes to staging workspace
            📁 **Workspace:** ${{ env.STAGING_WORKSPACE_URL }}
            🔗 **Commit:** [`${{ steps.report.outputs.short_sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            ⏰ **Synced at:** ${{ steps.report.outputs.now }} UTC

            ### Sync Details
            ```
            ${{ steps.sync_staging.outputs.SYNC_OUTPUT }}
            ```

      - name: Report staging sync status on commit
        if: success() && github.event_name == 'push' && steps.merged_pr.outputs.result == ''
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const syncOutput = `${{ steps.sync_staging.outputs.SYNC_OUTPUT }}`;
            const body = `## 🎉 Staging Workspace Sync Successful\n\n✅ Successfully synced changes to staging workspace\n📁 **Workspace:** ${{ env.STAGING_WORKSPACE_URL }}\n🔗 **Commit:** [\`${context.sha.substring(0, 7)}\`](https://github.com/${context.repo.owner}/${context.repo.repo}/commit/${context.sha})\n⏰ **Synced at:** ${{ steps.report.outputs.now }} UTC\n\n### Sync Details\n\`\`\`\n${syncOutput}\n\`\`\``;

            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: body
            });

      - name: Report production sync status
        if: success() && startsWith(github.ref, 'refs/tags/v')
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const syncOutput = `${{ steps.sync_production.outputs.SYNC_OUTPUT }}`;
            const body = `## 🎉 Production Workspace Sync Successful\n\n✅ Successfully synced release to production workspace\n📁 **Workspace:** ${{ env.PRODUCTION_WORKSPACE_URL }}\n🏷️ **Tag:** ${{ github.ref_name }}\n🔗 **Commit:** [\`${context.sha.substring(0, 7)}\`](https://github.com/${context.repo.owner}/${context.repo.repo}/commit/${context.sha})\n⏰ **Synced at:** ${new Date().toISOString().replace('T', ' ').substring(0, 19)} UTC\n\n### Sync Details\n\`\`\`\n${syncOutput}\n\`\`\``;

            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: body
            });

      - name: Report dry-run status
        if: success() && github.event_name == 'pull_request' && github.event.action != 'closed'
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: workspace-sync
          message: |
            ## 🔍 Workspace Sync Dry-Run Complete

            ✅ Dry-run completed successfully - no changes were made
            📁 **Target workspace:** ${{ env.STAGING_WORKSPACE_URL }}
            🔗 **PR:** #${{ github.event.number }}
            ℹ️ Changes will be synced when this PR is merged to main

            <details>
            <summary>Dry-Run Results</summary>

            ```
            ${{ steps.dry_run.outputs.SYNC_OUTPUT }}
            ```
            </details>

      - name: Compose failure message
        if: failure()
        id: fail
        run: |
          {
            echo "short_sha=${GITHUB_SHA::7}"
            if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
              echo "environment=production"
              echo "workspace=${{ env.PRODUCTION_WORKSPACE_URL }}"
            else
              echo "environment=staging"
              echo "workspace=${{ env.STAGING_WORKSPACE_URL }}"
            fi
            STAGING_OUT='${{ steps.sync_staging.outputs.SYNC_OUTPUT }}'
            PROD_OUT='${{ steps.sync_production.outputs.SYNC_OUTPUT }}'
            DRY_OUT='${{ steps.dry_run.outputs.SYNC_OUTPUT }}'
            OUT="${STAGING_OUT:-${PROD_OUT:-${DRY_OUT:-No output captured}}}"
            echo "output<<EOF"
            echo "$OUT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Report sync failure on PR
        if: failure() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: workspace-sync
          message: |
            ## ❌ Staging Workspace Sync Failed

            ❌ Failed to sync changes to staging workspace
            📁 **Workspace:** ${{ steps.fail.outputs.workspace }}
            🔗 **Commit:** [`${{ steps.fail.outputs.short_sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            ⚠️ **Action required:** Please check the workflow logs for details

            ### Error Output
            ```
            ${{ steps.fail.outputs.output }}
            ```

            ### Troubleshooting
            - Verify Matrix credentials are correctly set in repository secrets
            - Check workspace permissions and URL
            - Review file filtering rules (.gitignore/.boxelignore)

      - name: Report sync failure on commit
        if: failure() && github.event_name != 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const syncOutput = `${{ steps.fail.outputs.output }}`;
            const environment = '${{ steps.fail.outputs.environment }}';
            const workspace = '${{ steps.fail.outputs.workspace }}';
            const title = environment.charAt(0).toUpperCase() + environment.slice(1);
            const body = `## ❌ ${title} Workspace Sync Failed\n\n❌ Failed to sync changes to ${environment} workspace\n📁 **Workspace:** ${workspace}\n🔗 **Commit:** [\`${context.sha.substring(0, 7)}\`](https://github.com/${context.repo.owner}/${context.repo.repo}/commit/${context.sha})\n⚠️ **Action required:** Please check the workflow logs for details\n\n### Error Output\n\`\`\`\n${syncOutput}\n\`\`\`\n\n### Troubleshooting\n- Verify Matrix credentials are correctly set in repository secrets\n- Check workspace permissions and URL\n- Review file filtering rules (.gitignore/.boxelignore)`;

            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: body
            });
