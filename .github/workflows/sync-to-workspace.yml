name: Sync to Workspace

# Delegates to the reusable workflow in cardstack/boxel. Tracks @main
# so changes to the realm-server's _publish/_unpublish-realm contract
# or boxel-cli's realm push/publish commands auto-propagate on the next
# run; the monorepo's preview-realm-integration workflow gates them
# behind a path-filtered E2E test, so contract drift surfaces there at
# PR time before consumers start failing.

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize]
    branches: [main]
  release:
    types: [published]

jobs:
  sync:
    uses: cardstack/boxel/.github/workflows/sync-workspace.yml@main
    with:
      staging-workspace-url: https://realms-staging.stack.cards/skills/
      production-workspace-url: https://app.boxel.ai/skills/
    secrets:
      staging-matrix-username: ${{ secrets.STAGING_MATRIX_USERNAME }}
      production-matrix-username: ${{ secrets.MATRIX_USERNAME }}
      staging-matrix-password: ${{ secrets.STAGING_MATRIX_PASSWORD }}
      production-matrix-password: ${{ secrets.MATRIX_PASSWORD }}
