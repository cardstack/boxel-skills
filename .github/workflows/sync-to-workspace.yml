name: Sync to Workspace

# Delegates to the reusable workflow in cardstack/boxel. The ref is
# pinned to the cs-11180 PR branch while #4897 is open so this PR's CI
# exercises the reusable workflow before merge; swap to @main once
# #4897 lands.

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize]
    branches: [main]
  release:
    types: [published]

jobs:
  sync:
    uses: cardstack/boxel/.github/workflows/sync-workspace.yml@cs-11180-extract-shared-preview-realm-github-actions-to-monorepo
    with:
      staging-workspace-url: https://realms-staging.stack.cards/skills/
      production-workspace-url: https://app.boxel.ai/skills/
    secrets:
      staging-matrix-username: ${{ secrets.STAGING_MATRIX_USERNAME }}
      production-matrix-username: ${{ secrets.MATRIX_USERNAME }}
      staging-matrix-password: ${{ secrets.STAGING_MATRIX_PASSWORD }}
      production-matrix-password: ${{ secrets.MATRIX_PASSWORD }}
